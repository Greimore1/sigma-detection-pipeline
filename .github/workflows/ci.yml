name: Sigma Detection Pipeline

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Sigma rules
        run: python tools/validate.py

      - name: Run rule unit tests
        run: python tools/test_rules.py

      - name: Convert rules to KQL
        run: python tools/convert.py
