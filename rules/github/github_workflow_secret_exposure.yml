title: GitHub Actions Workflow Potential Secret Exposure
id: 1f4cfe2b-1f9a-4b39-9288-71c27608a501
status: test
description: Detects suspicious GitHub Actions workflow modification that may expose secrets through logging or script execution.
author: Adam Osbourne
date: 2026/04/25
logsource:
  product: github
  service: audit
  category: ci_cd
detection:
  selection:
    action: workflow_run.updated
    workflow_file: contains:.github/workflows/
    change_summary: contains:secrets.
  condition: selection
fields:
  - actor
  - repository
  - workflow_file
  - change_summary
falsepositives:
  - Approved workflow maintenance by trusted engineering teams
level: high
tags:
  - attack.t1552
  - attack.t1059
